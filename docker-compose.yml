services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./aibot.db:/app/aibot.db
      - ./sessions:/app/sessions
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: ["celery", "-A", "celery_worker", "worker", "--loglevel=info"]
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./aibot.db:/app/aibot.db
      - ./sessions:/app/sessions
    depends_on:
      redis:
        condition: service_healthy

  beat:
    build: .
    command: ["celery", "-A", "celery_worker", "beat", "--loglevel=info"]
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./aibot.db:/app/aibot.db
      - ./sessions:/app/sessions
      - ./celerybeat-schedule.db:/app/celerybeat-schedule.db
    depends_on:
      redis:
        condition: service_healthy
